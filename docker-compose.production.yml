version: '3.8'

# ============================================================
# DOCKER COMPOSE - PRODUCTION
# procura.mirlab.cloud
# Usage: docker-compose -f docker-compose.production.yml up -d
# ============================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 --max-requests 1000 --max-requests-jitter 100 saas_procurement.wsgi:application
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
      - logs:/app/logs
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=saas_procurement.settings_production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=procura_db
      - POSTGRES_USER=procura_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme_in_env}
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procura_user -d procura_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A saas_procurement worker -l info --concurrency=2
    volumes:
      - media:/app/media
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=saas_procurement.settings_production
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A saas_procurement beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=saas_procurement.settings_production
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  staticfiles:
  media:
  logs:
