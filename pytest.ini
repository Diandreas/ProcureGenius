[pytest]
DJANGO_SETTINGS_MODULE = saas_procurement.settings
python_files = test_*.py tests.py *_tests.py
# Les tests asynchrones (handlers IA) utilisent @pytest.mark.asyncio.
asyncio_mode = auto
markers =
    integration: tests d'intégration nécessitant des services externes (LLM Mistral, etc.)
filterwarnings =
    ignore::DeprecationWarning
